<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Birds of Wonder</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-6xl px-6 py-10">
      <header class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Birds of Wonder</h1>
          <p class="text-slate-300 mt-2">
            A tiny product demo: beautiful cards, an API, health check, and Prometheus metrics.
          </p>
        </div>
        <div class="flex gap-2">
          <a class="rounded-xl bg-slate-800 px-4 py-2 hover:bg-slate-700" href="/api/birds">API</a>
          <a class="rounded-xl bg-slate-800 px-4 py-2 hover:bg-slate-700" href="/metrics">Metrics</a>
          <a class="rounded-xl bg-slate-800 px-4 py-2 hover:bg-slate-700" href="/healthz">Health</a>
        </div>
      </header>

      <section class="mt-10 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        {% for b in birds %}
        <article class="rounded-2xl overflow-hidden bg-slate-900 shadow-xl border border-slate-800">
          <img src="{{ b.img }}" alt="{{ b.name }}" class="h-44 w-full object-cover" />
          <div class="p-5">
            <h2 class="text-xl font-semibold">{{ b.name }}</h2>
            <p class="text-slate-400 italic">{{ b.scientific }}</p>
            <p class="mt-3 text-slate-200">{{ b.fact }}</p>
            <div class="mt-4 inline-flex items-center rounded-full bg-slate-800 px-3 py-1 text-sm text-slate-300">
              {{ b.region }}
            </div>
          </div>
        </article>
        {% endfor %}
      </section>

      <footer class="mt-12 text-sm text-slate-500">
        Built with FastAPI + Tailwind. Deployed via GitOps (ArgoCD).
      </footer>
    </div>
  </body>
</html>
